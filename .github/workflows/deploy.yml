name: Deploy to EC2

on:
  push:
    branches: [ dev ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build JAR
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/build/libs/backend-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/deploy/

      - name: Restart app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "backend.*SNAPSHOT" || true
            sleep 2
            cp /home/ec2-user/deploy/backend/build/libs/backend-0.0.1-SNAPSHOT.jar \
               /home/ec2-user/app/backend/build/libs/backend-0.0.1-SNAPSHOT.jar
            export DB_URL="jdbc:postgresql://localhost:5432/kookminfeed"
            export DB_USERNAME="kookmin"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            nohup java -jar /home/ec2-user/app/backend/build/libs/backend-0.0.1-SNAPSHOT.jar \
              > /home/ec2-user/app.log 2>&1 &
            echo "Deploy done. PID: $!"
